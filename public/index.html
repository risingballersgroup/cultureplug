<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culture Plug — Rising Ballers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0c;
    --surface: #161614;
    --border: #272723;
    --accent: #00FFAA;
    --gold: #c9a84c;
    --white: #f0ede6;
    --muted: #8a8880;
    --muted2: #2e2d29;
    --pink: #ffb3c6;
  }

  /* ── DEMOGRAPHICS / PINK THEME ── */
  .theme-pink .resp-section-title { color: var(--pink); border-bottom-color: rgba(255,179,198,0.2); }
  .theme-pink .stat-card { background: rgba(255,179,198,0.03); border-color: rgba(255,179,198,0.12); border-left-color: var(--pink); }
  .theme-pink .stat-number { color: var(--pink); }
  .theme-pink .sources-btn.active { border-color: rgba(255,179,198,0.35); color: var(--pink); }
  .theme-pink .source-card-name { color: var(--pink); }
  .theme-pink .chat-mode-badge { color: var(--pink); border-color: rgba(255,179,198,0.3); }
  .theme-pink strong { color: var(--pink); }
  .theme-pink .list-num { color: var(--pink); }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    font-style: normal;
    color: var(--white);
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    cursor: pointer;
  }
  .logo:hover { opacity: 0.75; }
  .logo-rule { width: 1px; height: 16px; background: var(--border); }
  .logo-sub {
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 32px; }

  .header-stat { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
  .header-stat-n { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; color: var(--white); line-height: 1; }
  .header-stat-l { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .live-dot {
    width: 8px; height: 8px;
    background: var(--accent); border-radius: 50%;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ── MAIN ── */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── LANDING ── */
  .landing {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 0 40px 100px;
    width: 100%;
    max-width: 760px;
    gap: 20px;
    text-align: left;
  }

  .landing-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .landing-headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(32px, 3.8vw, 50px);
    font-weight: 700;
    line-height: 1.15;
    color: var(--white);
  }
  .landing-headline em { color: var(--gold); font-style: italic; }

  .landing-sub {
    font-size: 13px;
    color: var(--muted);
    letter-spacing: 0.2px;
    line-height: 1.5;
  }

  .prompt-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
    justify-content: flex-start;
  }

  .pill {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    padding: 7px 16px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
  }
  .pill:hover { border-color: rgba(255,255,255,0.18); color: var(--white); }

  /* ── MODE SELECTOR ── */
  .mode-selector {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .mode-selector-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .mode-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    justify-content: flex-start;
  }

  .mode-tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 5px 12px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .mode-tab:hover { border-color: rgba(255,255,255,0.18); color: var(--white); }
  .mode-tab.active { border-color: rgba(0,255,170,0.4); color: var(--accent); background: rgba(0,255,170,0.05); }

  .pill-group {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .pill-group-label {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  /* active mode indicator in chat */
  .chat-mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(0,255,170,0.25);
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 8px;
  }

  /* ── CHAT ── */
  .chat-view {
    display: none;
    flex-direction: column;
    width: 100%;
    max-width: 760px;
    padding: 48px 40px 140px;
    gap: 36px;
  }
  .chat-view.visible { display: flex; }

  .msg { display: flex; flex-direction: column; gap: 6px; animation: fadeUp 0.28s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-items: flex-end; }
  .msg.ai   { align-items: flex-start; width: 100%; }

  .msg-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 0 2px;
  }

  .msg.user .msg-bubble {
    border: 1px solid var(--border);
    color: var(--white);
    font-size: 14px;
    line-height: 1.65;
    padding: 12px 18px;
    max-width: 80%;
    border-radius: 2px;
  }

  .msg.ai .msg-bubble {
    width: 100%;
    font-size: 14px;
    line-height: 1.8;
    color: var(--white);
  }

  /* Typing */
  .typing-wrap { display: flex; gap: 5px; align-items: center; padding: 14px 0; }
  .t-dot { width: 4px; height: 4px; background: var(--muted); border-radius: 50%; animation: tdot 1.2s ease-in-out infinite; }
  .t-dot:nth-child(2){animation-delay:0.18s} .t-dot:nth-child(3){animation-delay:0.36s}
  @keyframes tdot { 0%,60%,100%{opacity:0.25;transform:translateY(0)} 30%{opacity:1;transform:translateY(-3px)} }

  /* ── RICH RESPONSE ── */
  .resp-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 18px;
    margin-top: 32px;
  }
  .resp-section-title:first-child { margin-top: 0; }

  .resp-para { font-size: 14px; line-height: 1.8; color: var(--white); margin-bottom: 12px; }
  .resp-para:last-child { margin-bottom: 0; }
  .resp-spacer { height: 6px; }

  .stat-card {
    display: flex;
    flex-direction: column;
    gap: 6px;
    padding: 14px 16px;
    background: rgba(0,255,170,0.025);
    border: 1px solid rgba(0,255,170,0.1);
    border-left: 2px solid var(--accent);
    margin-bottom: 8px;
  }
  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }
  .stat-desc { font-size: 13px; color: var(--white); line-height: 1.5; }
  .stat-source { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.3px; }

  .resp-list { list-style: none; padding: 0; margin: 0 0 12px; display: flex; flex-direction: column; gap: 8px; }
  .resp-list li { font-size: 14px; line-height: 1.7; color: var(--white); padding-left: 16px; position: relative; }
  .resp-list li::before { content: '—'; position: absolute; left: 0; color: var(--muted); }
  .resp-olist li { padding-left: 0; display: flex; gap: 14px; }
  .resp-olist li::before { display: none; }
  .list-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gold); flex-shrink: 0; padding-top: 2px; min-width: 18px; }

  .msg.ai .msg-bubble strong { color: var(--gold); font-weight: 600; }
  .msg.ai .msg-bubble.theme-pink strong { color: var(--pink); }
  .citation { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.2px; }

  /* ── SOURCES TOGGLE ── */
  .sources-toggle {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .sources-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 5px 12px; cursor: pointer; border-radius: 100px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .sources-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--white); }
  .sources-btn.active { border-color: rgba(0,255,170,0.3); color: var(--accent); }
  .sources-btn svg { width: 10px; height: 10px; transition: transform 0.2s; }
  .sources-btn.active svg { transform: rotate(180deg); }

  .sources-panel {
    display: none;
    margin-top: 14px;
    flex-direction: column;
    gap: 10px;
  }
  .sources-panel.visible { display: flex; }

  .source-card {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-left: 2px solid var(--muted2);
  }
  .source-card-name {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 5px;
  }
  .source-card-meta {
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: var(--muted);
    letter-spacing: 0.3px; line-height: 1.6;
  }
  .source-card-detail {
    font-size: 12px; color: var(--white);
    opacity: 0.65; line-height: 1.6; margin-top: 5px;
  }

  /* ── INPUT ── */
  .input-wrapper {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 0 40px 32px;
    background: linear-gradient(to top, var(--bg) 65%, transparent);
    display: flex;
    justify-content: center;
  }

  .input-inner { max-width: 760px; width: 100%; position: relative; }

  /* ── MARKDOWN TABLES ── */
  .resp-table {
    width: 100%;
    border-collapse: collapse;
    margin: 12px 0;
    font-size: 13px;
  }
  .resp-table th {
    font-family: 'DM Mono', monospace;
    font-size: 8px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--muted);
    text-align: left;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    font-weight: 400;
  }
  .resp-table td {
    padding: 9px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    color: var(--white);
    line-height: 1.5;
  }
  .resp-table tr:last-child td { border-bottom: none; }
  .resp-table tr:hover td { background: rgba(255,255,255,0.02); }
  .theme-pink .resp-table th { color: rgba(255,179,198,0.5); }
  .theme-pink .resp-table td strong { color: var(--pink); }

  /* ── ACTIVE BRIEF CHIP ── */
  .brief-bar {
    display: none;
    align-items: center;
    gap: 10px;
    margin-bottom: 8px;
  }
  .brief-bar.visible { display: flex; }
  .brief-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 100px;
    padding: 5px 10px 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--gold);
  }
  .brief-chip-label { opacity: 0.5; margin-right: 4px; }
  .brief-chip-remove {
    background: none; border: none; cursor: pointer;
    color: var(--gold); opacity: 0.5;
    display: flex; align-items: center; padding: 0;
    transition: opacity 0.15s;
  }
  .brief-chip-remove:hover { opacity: 1; }
  .brief-chip-remove svg { width: 9px; height: 9px; }

  .input-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 18px 60px 18px 52px;
    resize: none;
    outline: none;
    min-height: 58px;
    max-height: 130px;
    line-height: 1.5;
    transition: border-color 0.2s;
    border-radius: 100px;
  }
  .input-box:focus { border-color: rgba(255,255,255,0.15); }
  .input-box::placeholder { color: var(--muted); }

  .upload-btn {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px;
    background: none; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--muted); transition: color 0.15s; border-radius: 50%;
    flex-shrink: 0;
  }
  .upload-btn:hover { color: var(--white); }
  .upload-btn.has-file { color: var(--accent); }
  .upload-btn svg { width: 16px; height: 16px; }

  .file-chip {
    display: none;
    align-items: center;
    gap: 8px;
    background: rgba(0,255,170,0.08);
    border: 1px solid rgba(0,255,170,0.2);
    border-radius: 100px;
    padding: 5px 12px;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    margin-bottom: 8px;
    width: fit-content;
  }
  .file-chip.visible { display: flex; }
  .file-chip-remove {
    background: none; border: none; cursor: pointer;
    color: var(--accent); opacity: 0.6;
    display: flex; align-items: center; padding: 0;
  }
  .file-chip-remove:hover { opacity: 1; }
  .file-chip-remove svg { width: 10px; height: 10px; }

  .send-btn {
    position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
    width: 40px; height: 40px;
    background: var(--gold); border: none; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: opacity 0.15s;
  }
  .send-btn:hover { opacity: 0.85; }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 14px; height: 14px; fill: #0e0e0c; }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <a class="logo" href="#" onclick="goHome(); return false;">
      <span>Certified</span>
      <div class="logo-rule"></div>
      <span class="logo-sub">Culture Plug</span>
    </a>
    <div class="header-right">
      <div class="header-stat">
        <div class="header-stat-n">50K+</div>
        <div class="header-stat-l">Respondents</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-n">5</div>
        <div class="header-stat-l">Data Sources</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-n">Jan 2023 – Aug 2025</div>
        <div class="header-stat-l">Coverage</div>
      </div>
      <div class="live-dot"></div>
    </div>
  </header>

  <div class="main" id="main">

    <div class="landing" id="landing">
      <div class="landing-eyebrow">Rising Ballers × She's A Baller — Internal</div>
      <h1 class="landing-headline">What do you need to know<br><em>before you pitch?</em></h1>
      <p class="landing-sub">Audience data · pitch briefs · content strategy — grounded in your first-party research</p>
      <div class="mode-selector">
        <div class="mode-selector-label">Mode</div>
        <div class="mode-tabs">
          <button class="mode-tab active" onclick="setMode('pitch', this)">Pitch Brief</button>
          <button class="mode-tab" onclick="setMode('persona', this)">Audience Persona</button>
          <button class="mode-tab" onclick="setMode('compare', this)">Audience Comparison</button>
          <button class="mode-tab" onclick="setMode('calendar', this)">Seasonal Calendar</button>
          <button class="mode-tab" onclick="setMode('exec', this)">Exec Summary</button>
          <button class="mode-tab" onclick="setMode('objection', this)">Objection Handler</button>
          <button class="mode-tab" onclick="setMode('email', this)">Initial Email</button>
        </div>
      </div>
      <div class="pill-group">
        <div class="pill-group-label">Example Queries</div>
        <div class="prompt-pills" id="promptPills">
          <button class="pill" onclick="usePill(this)">World Cup 2026 insights</button>
          <button class="pill" onclick="usePill(this)">SAB thought-starters for music brand</button>
          <button class="pill" onclick="usePill(this)">Mental health insights in football</button>
          <button class="pill" onclick="usePill(this)">Pitch to Apple based on our insights</button>
          <button class="pill" onclick="usePill(this)">Grassroots insights across men & women</button>
        </div>
      </div>
    </div>

    <div class="chat-view" id="chatView">
      <div id="messages"></div>
    </div>

  </div>

  <div class="input-wrapper">
    <div class="input-inner">
      <div class="brief-bar" id="briefBar">
        <div class="brief-chip">
          <span class="brief-chip-label">Brief</span>
          <span id="briefChipName"></span>
          <button class="brief-chip-remove" onclick="clearActiveBrief()" title="Clear brief">
            <svg viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div class="file-chip" id="fileChip">
        <span class="file-chip-name" id="fileChipName"></span>
        <button class="file-chip-remove" onclick="removeFile()" title="Remove file">
          <svg viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div style="position:relative">
        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt" style="display:none" onchange="handleFile(event)">
        <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()" title="Upload a brief">
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M2 10v3a1 1 0 001 1h10a1 1 0 001-1v-3M8 2v8M5 5l3-3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <textarea
          class="input-box"
          id="inputBox"
          placeholder="Name a brand or category — e.g. 'Pitch to Beats by Dre'"
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 16 16"><path d="M2 8l12-6-5 6 5 6z"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>
<script>
let isLoading = false;
let conversationHistory = [];
let attachedFile = null;
let attachedFileContent = '';
let currentMode = 'pitch';
let activeBrief = null; // { brand, context } — persists across messages

const MODES = {
  pitch: {
    label: 'Pitch Brief',
    placeholder: "Name a brand or category — e.g. 'Pitch to Beats by Dre'",
    pills: [
      'World Cup 2026 insights',
      'SAB thought-starters for music brand',
      'Mental health insights in football',
      'Pitch to Apple based on our insights',
      'Grassroots insights across men & women'
    ]
  },
  persona: {
    label: 'Audience Persona',
    placeholder: "Describe an audience — e.g. 'RB core audience' or 'SAB ultimate fan'",
    pills: [
      'RB core audience persona',
      'SAB ultimate fan persona',
      'Gen Z grassroots player persona',
      'World Cup 2026 multi-national fan',
      "Women's football superfan persona"
    ]
  },
  compare: {
    label: 'Audience Comparison',
    placeholder: "What to compare — e.g. 'RB vs SAB demographics across platforms'",
    pills: [
      'RB vs SAB gender split across platforms',
      'RB Instagram vs TikTok demographics',
      'RB vs SAB age breakdown',
      'RB vs SAB top countries comparison',
      'Combined RB + SAB audience overview'
    ]

  { name: 'Whoop',             category: 'Sports Tech' },
  { name: 'FotMob',            category: 'Sports Tech' },
  { name: 'TransferRoom',      category: 'Sports Tech' },
  { name: 'JBL',               category: 'Audio & Tech' },
  { name: 'EE',                category: 'Telecoms' },
  { name: 'Mastercard',        category: 'Finance' },
  { name: 'Deloitte',          category: 'Finance' },
  { name: 'National Lottery',  category: 'Finance' },
  { name: 'Universal',         category: 'Music & Entertainment' },
  { name: 'Unilever',          category: 'FMCG' },
  { name: 'Mondelez',          category: 'FMCG' },
  { name: 'Glanbia',           category: 'FMCG' },
  { name: 'Eyeball',           category: 'Agency' },
];

function getSocialProof(brandName) {
  if (!brandName) return '';
  const name = brandName.toLowerCase();

  // Exclude the brand itself
  const eligible = EXISTING_CLIENTS.filter(c => c.name.toLowerCase() !== name);

  // Never suggest a direct competitor
  const COMPETITOR_PAIRS = [
    ['Nike','adidas'],['Nike','Puma'],['Nike','Under Armour'],['Nike','New Balance'],
    ['adidas','Puma'],['adidas','Under Armour'],['adidas','New Balance'],
    ['Puma','Under Armour'],['Puma','New Balance'],
    ['PlayStation','Xbox'],
    ['Guinness','Asahi'],['Guinness','Jameson'],['Asahi','Jameson'],
    ['Google','YouTube'],['Google','TikTok'],
    ["McDonald's",'Subway'],["McDonald's","Nando's"],["McDonald's",'Wingstop'],
    ['Sky Sports','TNT Sports'],['Sky Sports','BBC'],
    ['EA Sports','Activision'],['EA Sports','Football Manager'],
  ];
  const isCompetitor = (a, b) => COMPETITOR_PAIRS.some(p =>
    (p[0].toLowerCase()===a && p[1].toLowerCase()===b) ||
    (p[1].toLowerCase()===a && p[0].toLowerCase()===b)
  );

  const safe = eligible.filter(c => !isCompetitor(name, c.name.toLowerCase()));
  if (safe.length === 0) return '';

  // Pick 3 from different categories — prioritise recognisable household names
  const TIER1 = ['Nike','adidas','EA Sports','PlayStation','Google','TikTok','Netflix','Mastercard','Guinness',"McDonald's",'Universal','Premier League','YouTube','Unilever','The FA'];
  const TIER2 = ['Under Armour','New Balance','Puma','Sky Sports','JBL','Whoop','Just Eat',"Nando's",'Red Bull Leipzig','MLS','NFL','Hollister','Ugg','JD Sports','Chelsea FC'];

  const picked = [];
  const usedCategories = new Set();

  for (const n of [...TIER1, ...TIER2]) {
    if (picked.length >= 3) break;
    const client = safe.find(c => c.name === n);
    if (client && !usedCategories.has(client.category)) {
      picked.push(client);
      usedCategories.add(client.category);
    }
  }

  if (picked.length === 0) return '';

  const names = picked.map(c => c.name);
  const listStr = names.length === 1 ? names[0]
    : names.slice(0,-1).join(', ') + ' & ' + names[names.length-1];

  return `SOCIAL PROOF CONTEXT: Rising Ballers has existing partnerships with ${listStr}. Include a line like "We've done similar culture-led work with the likes of ${listStr}." Use all names listed. Never name a direct competitor of the brand being pitched.`;
}

function getSystemPrompt(mode, fileCtx) {
  const briefCtx = activeBrief
    ? `ACTIVE BRIEF CONTEXT: The user is currently pitching to / focused on "${activeBrief.brand}". Keep this brand in mind throughout the conversation unless they explicitly ask about something else. Reference it naturally.\n`
    : '';

  const socialProofCtx = (mode === 'email' && activeBrief)
    ? getSocialProof(activeBrief.brand) + '\n'
    : '';

  return `You are Culture Plug — the internal commercial intelligence engine for Rising Ballers, a football media and production company. You have access to Rising Ballers' proprietary first-party data corpus below.

${DATA_CORPUS}

${briefCtx}${socialProofCtx}${fileCtx ? `The user has uploaded a brand brief for context:\n${fileCtx}\n` : ''}

${MODE_PROMPTS[mode] || MODE_PROMPTS.pitch}

UNIVERSAL RULES:
- NEVER invent stats. If no data exists, say DATA GAP.
- Cite every stat immediately after using it: [Source Name, N=xxx]
- Bold stat numbers and key phrases using **markdown**
- Write confidently — this is a culture company, not a research agency
- Sharp and specific beats long and vague

DEMOGRAPHICS RULES (apply whenever the question touches audience size, gender, age, geography, or platform):
- Always specify WHICH channel the data is from (RB IG / SAB IG / RB TikTok / SAB TikTok)
- Keep RB and SAB data separate unless the user explicitly asks to combine them
- When combining is requested, use the combined totals section and label clearly
- For gender: note the Nonbinary/Unspecified caveat on Instagram (platform artefact, not a real signal)
- For geographic questions: distinguish between IG and TikTok if the pattern differs (e.g. RB TikTok is 68% UK — much more concentrated than RB IG at 20% UK)
- Age data is Instagram-only; TikTok does not export age breakdowns via Sprout Social
- Cite all demographic data as [Sprout Social Demographics, Jan–Mar 2026]`;
}

function setActiveBrief(brand) {
  activeBrief = { brand };
  document.getElementById('briefChipName').textContent = brand;
  document.getElementById('briefBar').classList.add('visible');
}

function clearActiveBrief() {
  activeBrief = null;
  document.getElementById('briefBar').classList.remove('visible');
  document.getElementById('briefChipName').textContent = '';
}

function detectBrandFromQuery(text) {
  // Patterns: "pitch to X", "brief for X", "pitching X", "pitch X"
  const patterns = [
    /pitch(?:ing)? (?:to |for )?([A-Z][A-Za-z0-9 &'\.]+?)(?:\s+based|\s+using|\s+with|$)/,
    /brief for ([A-Z][A-Za-z0-9 &'\.]+?)(?:\s+based|\s+using|\s+with|$)/,
    /for ([A-Z][A-Za-z0-9 &'\.]+?) (?:pitch|brief|deck|campaign)/i,
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m && m[1] && m[1].trim().length > 1 && m[1].trim().length < 40) {
      return m[1].trim();
    }
  }
  return null;
}

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');
  const m = MODES[mode];
  document.getElementById('inputBox').placeholder = m.placeholder;
  const pillsEl = document.getElementById('promptPills');
  pillsEl.innerHTML = m.pills.map(p =>
    `<button class="pill" onclick="usePill(this)">${p}</button>`
  ).join('');
}

function detectSources(text) {
  const found = [];
  const sourceMap = {
    'RB IG Insights': 'RB IG Insights',
    'SAB IG Insights': 'SAB IG Insights',
    'Next Wave Vol.1': 'Next Wave Vol.1',
    'Next Wave': 'Next Wave Vol.1',
    'World Cup Heartbeats': 'World Cup Heartbeats',
    "Women's Fandom Report": "Women's Fandom Report",
    'Sprout Social Demographics': 'Sprout Social Demographics',
    'Sprout Social': 'Sprout Social Demographics',
    'Jan–Mar 2026': 'Sprout Social Demographics',
  };
  const added = new Set();
  for (const [keyword, sourceKey] of Object.entries(sourceMap)) {
    if (text.includes(keyword) && !added.has(sourceKey)) {
      found.push(sourceKey);
      added.add(sourceKey);
    }
  }
  return found;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function usePill(btn) {
  document.getElementById('inputBox').value = btn.textContent.trim();
  autoResize(document.getElementById('inputBox'));
  sendMessage();
}

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  attachedFile = file;
  const chip = document.getElementById('fileChip');
  document.getElementById('fileChipName').textContent = file.name;
  chip.classList.add('visible');
  document.getElementById('uploadBtn').classList.add('has-file');
  const reader = new FileReader();
  reader.onload = e => { attachedFileContent = e.target.result; };
  if (file.type === 'application/pdf') {
    attachedFileContent = `[PDF uploaded: ${file.name}]`;
  } else {
    reader.readAsText(file);
  }
  const inputBox = document.getElementById('inputBox');
  if (!inputBox.value.trim()) {
    inputBox.value = 'Build a pitch brief based on the uploaded brief';
    autoResize(inputBox);
  }
  inputBox.focus();
  event.target.value = '';
}

function removeFile() {
  attachedFile = null;
  attachedFileContent = '';
  document.getElementById('fileChip').classList.remove('visible');
  document.getElementById('fileChipName').textContent = '';
  document.getElementById('uploadBtn').classList.remove('has-file');
}

function goHome() {
  document.getElementById('landing').style.display = '';
  document.getElementById('chatView').classList.remove('visible');
  document.getElementById('messages').innerHTML = '';
  conversationHistory = [];
  document.getElementById('inputBox').value = '';
  document.getElementById('inputBox').style.height = 'auto';
  removeFile();
  clearActiveBrief();
}

function showChat() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('chatView').classList.add('visible');
}

function scrollBottom() {
  const main = document.getElementById('main');
  main.scrollTo({ top: main.scrollHeight, behavior: 'smooth' });
}

function addUserMsg(text) {
  showChat();
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="msg-label">You</div><div class="msg-bubble">${text.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg ai'; el.id = 'typing';
  el.innerHTML = `<div class="chat-mode-badge">${MODES[currentMode].label}</div><div class="msg-label">Culture Plug</div><div class="typing-wrap"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function toggleSources(btn, panelId) {
  btn.classList.toggle('active');
  const panel = document.getElementById(panelId);
  panel.classList.toggle('visible');
}

function buildSourcesPanel(text, panelId) {
  const sources = detectSources(text);
  if (!sources.length) return '';
  const cards = sources.map(key => {
    const s = SOURCE_LIBRARY[key];
    return `<div class="source-card">
      <div class="source-card-name">${s.name}</div>
      <div class="source-card-meta">${s.meta}</div>
      <div class="source-card-detail">${s.detail}</div>
    </div>`;
  }).join('');
  return `<div class="sources-toggle">
    <button class="sources-btn" onclick="toggleSources(this, '${panelId}')">
      <svg viewBox="0 0 10 10" fill="none"><path d="M1 3l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Show sources (${sources.length})
    </button>
    <div class="sources-panel" id="${panelId}">${cards}</div>
  </div>`;
}

function addAIMsg(text, mode) {
  const el = document.createElement('div');
  el.className = 'msg ai';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  // Apply pink theme for demographic/Sprout Social responses
  const isDemographic = text.includes('Sprout Social') || text.includes('Jan–Mar 2026') ||
    text.includes('RB Instagram') || text.includes('SAB Instagram') ||
    text.includes('RB TikTok') || text.includes('SAB TikTok') ||
    (mode === 'compare' && (text.includes('%') && (text.includes('follower') || text.includes('gender') || text.includes('country') || text.includes('age'))));
  if (isDemographic) bubble.classList.add('theme-pink');

  const panelId = 'sources-' + Date.now();
  const modeLabel = MODES[mode] ? `<div class="chat-mode-badge">${MODES[mode].label}</div>` : '';
  bubble.innerHTML = modeLabel + renderMarkdown(text) + buildSourcesPanel(text, panelId);
  el.appendChild(Object.assign(document.createElement('div'), { className: 'msg-label', textContent: 'Culture Plug' }));
  el.appendChild(bubble);
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function renderMarkdown(text) {
  const lines = text.split('\n');
  let html = '', inList = false, inOrderedList = false, inTable = false, tableHeaders = [];

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];

    // ── TABLE DETECTION ──
    // Header row: | col | col |
    if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
      const nextLine = lines[i + 1] || '';
      const isHeader = nextLine.trim().match(/^\|[\s\-|]+\|$/);

      if (isHeader && !inTable) {
        // Close any open lists
        if (inList) { html += '</ul>'; inList = false; }
        if (inOrderedList) { html += '</ol>'; inOrderedList = false; }
        // Parse headers
        tableHeaders = line.split('|').map(c => c.trim()).filter(Boolean);
        html += '<table class="resp-table"><thead><tr>';
        tableHeaders.forEach(h => { html += `<th>${formatInline(h)}</th>`; });
        html += '</tr></thead><tbody>';
        inTable = true;
        i++; // skip separator line
        continue;
      }

      if (inTable) {
        // Skip separator lines
        if (line.trim().match(/^\|[\s\-|]+\|$/)) continue;
        const cells = line.split('|').map(c => c.trim()).filter(Boolean);
        html += '<tr>';
        cells.forEach(c => { html += `<td>${formatInline(c)}</td>`; });
        html += '</tr>';
        continue;
      }
    } else if (inTable) {
      html += '</tbody></table>';
      inTable = false;
    }
    if (line.startsWith('## ')) {
      if (inList) { html += '</ul>'; inList = false; }
      if (inOrderedList) { html += '</ol>'; inOrderedList = false; }
      html += `<div class="resp-section-title">${line.slice(3)}</div>`;
      continue;
    }
    if ((line.startsWith('- **') && line.includes('%')) || (line.startsWith('- **') && /\*\*\d+\.\d/.test(line))) {
      if (inList) { html += '</ul>'; inList = false; }
      if (inOrderedList) { html += '</ol>'; inOrderedList = false; }
      const m = line.match(/^- \*\*([^*]+)\*\*\s+(.+?)(?:\s+(\[.+?\]))?$/);
      if (m) {
        const num = m[1];
        const desc = m[2].replace(/\[.+?\]$/, '').trim();
        const src = (line.match(/\[([^\]]+)\]/) || ['',''])[0];
        const srcText = src ? src.slice(1,-1) : '';
        html += `<div class="stat-card"><div class="stat-number">${num}</div><div class="stat-desc">${formatInline(desc)}</div>${srcText ? `<div class="stat-source">${srcText}</div>` : ''}</div>`;
        continue;
      }
    }
    if (line.startsWith('- ')) {
      if (inOrderedList) { html += '</ol>'; inOrderedList = false; }
      if (!inList) { html += '<ul class="resp-list">'; inList = true; }
      html += `<li>${formatInline(line.slice(2))}</li>`;
      continue;
    }
    const nm = line.match(/^(\d+)\. (.+)/);
    if (nm) {
      if (inList) { html += '</ul>'; inList = false; }
      if (!inOrderedList) { html += '<ol class="resp-list resp-olist">'; inOrderedList = true; }
      html += `<li><span class="list-num">${nm[1]}.</span><span>${formatInline(nm[2])}</span></li>`;
      continue;
    }
    if (line.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; }
      if (inOrderedList) { html += '</ol>'; inOrderedList = false; }
      html += '<div class="resp-spacer"></div>';
      continue;
    }
    if (inList) { html += '</ul>'; inList = false; }
    if (inOrderedList) { html += '</ol>'; inOrderedList = false; }
    html += `<p class="resp-para">${formatInline(line)}</p>`;
  }
  if (inList) html += '</ul>';
  if (inOrderedList) html += '</ol>';
  if (inTable) html += '</tbody></table>';
  return html;
}

function formatInline(text) {
  return text
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\[([^\]]+)\]/g, '<span class="citation">[$1]</span>');
}

async function sendMessage() {
  const inputBox = document.getElementById('inputBox');
  const sendBtn = document.getElementById('sendBtn');
  const userText = inputBox.value.trim();
  if ((!userText && !attachedFile) || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;

  const displayText = attachedFile
    ? `${userText}${userText ? '\n' : ''}📎 ${attachedFile.name}`
    : userText;

  inputBox.value = '';
  inputBox.style.height = 'auto';

  const fileCtx = attachedFile
    ? `Attached brief: "${attachedFile.name}"${attachedFileContent ? '\n\n' + attachedFileContent.slice(0, 3000) : ''}`
    : '';
  const modeAtSend = currentMode;
  removeFile();

  addUserMsg(displayText);
  addTyping();

  // Detect brand from query and set active brief if not already set
  if (!activeBrief && userText) {
    const detected = detectBrandFromQuery(userText);
    if (detected) setActiveBrief(detected);
  }

  try {
    const messages = [
      ...conversationHistory,
      { role: 'user', content: (userText || 'Build a pitch brief based on the attached file') + (fileCtx ? '\n\n[ATTACHED BRIEF]\n' + fileCtx : '') }
    ];

    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 2000,
        system: getSystemPrompt(modeAtSend, fileCtx),
        messages
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      addAIMsg('## ERROR\n' + (data.error.message || 'Something went wrong. Please try again.'), modeAtSend);
    } else {
      const aiText = data.content[0].text;
      conversationHistory.push({ role: 'user', content: userText || 'Build a pitch brief' });
      conversationHistory.push({ role: 'assistant', content: aiText });
      addAIMsg(aiText, modeAtSend);
    }
  } catch (err) {
    removeTyping();
    addAIMsg('## CONNECTION ERROR\nCould not reach the server. Please check your connection and try again.', modeAtSend);
  }

  isLoading = false;
  sendBtn.disabled = false;
}

// Initialise pills on load
setMode('pitch', document.querySelector('.mode-tab.active'));
</script>
