<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Culture Plug — Rising Ballers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0c;
    --surface: #161614;
    --border: #272723;
    --accent: #00FFAA;
    --gold: #c9a84c;
    --white: #f0ede6;
    --muted: #5a574f;
    --muted2: #2e2d29;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
  }

  .app {
    display: flex;
    flex-direction: column;
    height: 100vh;
  }

  /* ── HEADER ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    flex-shrink: 0;
  }

  .logo {
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--white);
    display: flex;
    align-items: center;
    gap: 12px;
    text-decoration: none;
    cursor: pointer;
  }
  .logo:hover { opacity: 0.75; }
  .logo-rule { width: 1px; height: 16px; background: var(--border); }
  .logo-sub {
    font-family: 'DM Mono', monospace;
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  .header-right { display: flex; align-items: center; gap: 32px; }

  .header-stat { display: flex; flex-direction: column; align-items: flex-end; gap: 1px; }
  .header-stat-n { font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600; color: var(--white); line-height: 1; }
  .header-stat-l { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }

  .live-dot {
    width: 8px; height: 8px;
    background: var(--accent); border-radius: 50%;
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

  /* ── MAIN ── */
  .main {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
  }

  /* ── LANDING ── */
  .landing {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 0 40px 120px;
    max-width: 860px;
    gap: 28px;
  }

  .landing-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .landing-headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(42px, 5vw, 66px);
    font-weight: 700;
    line-height: 1.1;
    color: var(--white);
  }
  .landing-headline em { color: var(--gold); font-style: italic; }

  .landing-sub {
    font-size: 14px;
    color: var(--muted);
    letter-spacing: 0.2px;
    line-height: 1.5;
  }

  .prompt-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 4px;
  }

  .pill {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    padding: 8px 18px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.18s ease;
    white-space: nowrap;
  }
  .pill:hover { border-color: rgba(255,255,255,0.18); color: var(--white); }

  /* ── MODE SELECTOR ── */
  .mode-selector {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-top: 4px;
  }

  .mode-selector-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .mode-tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  .mode-tab {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.15s ease;
    white-space: nowrap;
  }
  .mode-tab:hover { border-color: rgba(255,255,255,0.18); color: var(--white); }
  .mode-tab.active { border-color: rgba(0,255,170,0.4); color: var(--accent); background: rgba(0,255,170,0.05); }

  /* active mode indicator in chat */
  .chat-mode-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: var(--accent);
    border: 1px solid rgba(0,255,170,0.25);
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 8px;
  }

  /* ── CHAT ── */
  .chat-view {
    display: none;
    flex-direction: column;
    width: 100%;
    max-width: 760px;
    padding: 48px 40px 140px;
    gap: 36px;
  }
  .chat-view.visible { display: flex; }

  .msg { display: flex; flex-direction: column; gap: 6px; animation: fadeUp 0.28s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(5px)} to{opacity:1;transform:translateY(0)} }
  .msg.user { align-items: flex-end; }
  .msg.ai   { align-items: flex-start; width: 100%; }

  .msg-label {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    padding: 0 2px;
  }

  .msg.user .msg-bubble {
    border: 1px solid var(--border);
    color: var(--white);
    font-size: 14px;
    line-height: 1.65;
    padding: 12px 18px;
    max-width: 80%;
    border-radius: 2px;
  }

  .msg.ai .msg-bubble {
    width: 100%;
    font-size: 14px;
    line-height: 1.8;
    color: var(--white);
  }

  /* Typing */
  .typing-wrap { display: flex; gap: 5px; align-items: center; padding: 14px 0; }
  .t-dot { width: 4px; height: 4px; background: var(--muted); border-radius: 50%; animation: tdot 1.2s ease-in-out infinite; }
  .t-dot:nth-child(2){animation-delay:0.18s} .t-dot:nth-child(3){animation-delay:0.36s}
  @keyframes tdot { 0%,60%,100%{opacity:0.25;transform:translateY(0)} 30%{opacity:1;transform:translateY(-3px)} }

  /* ── RICH RESPONSE ── */
  .resp-section-title {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--accent);
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 18px;
    margin-top: 32px;
  }
  .resp-section-title:first-child { margin-top: 0; }

  .resp-para { font-size: 14px; line-height: 1.8; color: var(--white); margin-bottom: 12px; }
  .resp-para:last-child { margin-bottom: 0; }
  .resp-spacer { height: 6px; }

  .stat-card {
    display: grid;
    grid-template-columns: auto 1fr;
    grid-template-rows: auto auto;
    gap: 1px 18px;
    padding: 16px 18px;
    background: rgba(0,255,170,0.025);
    border: 1px solid rgba(0,255,170,0.1);
    border-left: 2px solid var(--accent);
    margin-bottom: 8px;
  }
  .stat-number {
    font-family: 'Playfair Display', serif;
    font-size: 38px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
    grid-row: 1 / 3;
    align-self: center;
    min-width: 96px;
  }
  .stat-desc { font-size: 13px; color: var(--white); line-height: 1.4; align-self: end; }
  .stat-source { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); align-self: start; letter-spacing: 0.3px; margin-top: 2px; }

  .resp-list { list-style: none; padding: 0; margin: 0 0 12px; display: flex; flex-direction: column; gap: 8px; }
  .resp-list li { font-size: 14px; line-height: 1.7; color: var(--white); padding-left: 16px; position: relative; }
  .resp-list li::before { content: '—'; position: absolute; left: 0; color: var(--muted); }
  .resp-olist li { padding-left: 0; display: flex; gap: 14px; }
  .resp-olist li::before { display: none; }
  .list-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gold); flex-shrink: 0; padding-top: 2px; min-width: 18px; }

  .msg.ai .msg-bubble strong { color: var(--gold); font-weight: 600; }
  .citation { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--muted); letter-spacing: 0.2px; }

  /* ── SOURCES TOGGLE ── */
  .sources-toggle {
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .sources-btn {
    background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase;
    padding: 5px 12px; cursor: pointer; border-radius: 100px;
    display: inline-flex; align-items: center; gap: 6px;
    transition: all 0.15s;
  }
  .sources-btn:hover { border-color: rgba(255,255,255,0.15); color: var(--white); }
  .sources-btn.active { border-color: rgba(0,255,170,0.3); color: var(--accent); }
  .sources-btn svg { width: 10px; height: 10px; transition: transform 0.2s; }
  .sources-btn.active svg { transform: rotate(180deg); }

  .sources-panel {
    display: none;
    margin-top: 14px;
    flex-direction: column;
    gap: 10px;
  }
  .sources-panel.visible { display: flex; }

  .source-card {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-left: 2px solid var(--muted2);
  }
  .source-card-name {
    font-family: 'DM Mono', monospace;
    font-size: 9px; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--accent);
    margin-bottom: 5px;
  }
  .source-card-meta {
    font-family: 'DM Mono', monospace;
    font-size: 9px; color: var(--muted);
    letter-spacing: 0.3px; line-height: 1.6;
  }
  .source-card-detail {
    font-size: 12px; color: var(--white);
    opacity: 0.65; line-height: 1.6; margin-top: 5px;
  }

  /* ── INPUT ── */
  .input-wrapper {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    padding: 0 40px 32px;
    background: linear-gradient(to top, var(--bg) 65%, transparent);
  }

  .input-inner { max-width: 760px; position: relative; }

  .input-box {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--white);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    padding: 18px 60px 18px 24px;
    resize: none;
    outline: none;
    min-height: 58px;
    max-height: 130px;
    line-height: 1.5;
    transition: border-color 0.2s;
    border-radius: 100px;
  }
  .input-box:focus { border-color: rgba(255,255,255,0.15); }
  .input-box::placeholder { color: var(--muted); }

  .upload-btn {
    position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 30px; height: 30px;
    background: none; border: none;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    color: var(--muted); transition: color 0.15s; border-radius: 50%;
    flex-shrink: 0;
  }
  .upload-btn:hover { color: var(--white); }
  .upload-btn.has-file { color: var(--accent); }
  .upload-btn svg { width: 16px; height: 16px; }

  .input-box {
    padding-left: 52px !important;
  }

  .file-chip {
    display: none;
    align-items: center;
    gap: 8px;
    background: rgba(0,255,170,0.06);
    border: 1px solid rgba(0,255,170,0.2);
    padding: 5px 10px 5px 12px;
    border-radius: 100px;
    margin-bottom: 8px;
    width: fit-content;
  }
  .file-chip.visible { display: flex; }
  .file-chip-name {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.5px;
    max-width: 300px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-chip-remove {
    background: none; border: none; cursor: pointer;
    color: var(--muted); display: flex; align-items: center;
    padding: 0; transition: color 0.15s;
  }
  .file-chip-remove:hover { color: var(--white); }
  .file-chip-remove svg { width: 12px; height: 12px; }

  .send-btn {
    position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
    width: 38px; height: 38px;
    background: var(--gold); border: none; border-radius: 50%;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: background 0.15s;
  }
  .send-btn:hover { background: #d4b060; }
  .send-btn:disabled { background: var(--muted2); cursor: not-allowed; }
  .send-btn svg { width: 14px; height: 14px; fill: var(--bg); margin-left: 1px; }

  .input-hint {
    text-align: center;
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--muted2);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 10px;
  }

  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>
<div class="app">

  <header>
    <a class="logo" href="#" onclick="goHome(); return false;">
      <span>Culture Plug</span>
      <div class="logo-rule"></div>
      <span class="logo-sub">Audience Intelligence</span>
    </a>
    <div class="header-right">
      <div class="header-stat">
        <div class="header-stat-n">50K+</div>
        <div class="header-stat-l">Respondents</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-n">5</div>
        <div class="header-stat-l">Data Sources</div>
      </div>
      <div class="header-stat">
        <div class="header-stat-n">Jan 2023 – Aug 2025</div>
        <div class="header-stat-l">Coverage</div>
      </div>
      <div class="live-dot"></div>
    </div>
  </header>

  <div class="main" id="main">

    <div class="landing" id="landing">
      <div class="landing-eyebrow">Rising Ballers × She's A Baller — Internal</div>
      <h1 class="landing-headline">What do you need to know<br><em>before you pitch?</em></h1>
      <p class="landing-sub">Audience data · pitch briefs · content strategy — grounded in your first-party research</p>
      <div class="mode-selector">
        <div class="mode-selector-label">Mode</div>
        <div class="mode-tabs">
          <button class="mode-tab active" onclick="setMode('pitch', this)">Pitch Brief</button>
          <button class="mode-tab" onclick="setMode('persona', this)">Audience Persona</button>
          <button class="mode-tab" onclick="setMode('compare', this)">Audience Comparison</button>
          <button class="mode-tab" onclick="setMode('campaign', this)">Campaign Naming</button>
          <button class="mode-tab" onclick="setMode('calendar', this)">Seasonal Calendar</button>
          <button class="mode-tab" onclick="setMode('exec', this)">Exec Summary</button>
        </div>
      </div>
      <div class="prompt-pills" id="promptPills">
        <button class="pill" onclick="usePill(this)">World Cup 2026 insights</button>
        <button class="pill" onclick="usePill(this)">SAB thought-starters for music brand</button>
        <button class="pill" onclick="usePill(this)">Mental health insights in football</button>
        <button class="pill" onclick="usePill(this)">Pitch to Apple based on our insights</button>
        <button class="pill" onclick="usePill(this)">Grassroots insights across men & women</button>
      </div>
    </div>

    <div class="chat-view" id="chatView">
      <div id="messages"></div>
    </div>

  </div>

  <div class="input-wrapper">
    <div class="input-inner">
      <div class="file-chip" id="fileChip">
        <span class="file-chip-name" id="fileChipName"></span>
        <button class="file-chip-remove" onclick="removeFile()" title="Remove file">
          <svg viewBox="0 0 12 12" fill="none"><path d="M1 1l10 10M11 1L1 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div style="position:relative">
        <input type="file" id="fileInput" accept=".pdf,.doc,.docx,.txt" style="display:none" onchange="handleFile(event)">
        <button class="upload-btn" id="uploadBtn" onclick="document.getElementById('fileInput').click()" title="Upload a brief">
          <svg viewBox="0 0 16 16" fill="none">
            <path d="M2 10v3a1 1 0 001 1h10a1 1 0 001-1v-3M8 2v8M5 5l3-3 3 3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
        <textarea
          class="input-box"
          id="inputBox"
          placeholder="Ask about our audience, or upload a brand brief directly..."
          rows="1"
          onkeydown="handleKey(event)"
          oninput="autoResize(this)"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">
          <svg viewBox="0 0 16 16"><path d="M2 8l12-6-5 6 5 6z"/></svg>
        </button>
      </div>
    </div>
  </div>

</div>
<script>
let isLoading = false;
let conversationHistory = [];
let attachedFile = null;
let attachedFileContent = '';
let currentMode = 'pitch';

const MODES = {
  pitch: {
    label: 'Pitch Brief',
    placeholder: "Name a brand or category — e.g. 'Pitch to Beats by Dre'",
    pills: [
      'World Cup 2026 insights',
      'SAB thought-starters for music brand',
      'Mental health insights in football',
      'Pitch to Apple based on our insights',
      'Grassroots insights across men & women'
    ]
  },
  persona: {
    label: 'Audience Persona',
    placeholder: "Describe an audience — e.g. 'RB core audience' or 'SAB ultimate fan'",
    pills: [
      'RB core audience persona',
      'SAB ultimate fan persona',
      'Gen Z grassroots player persona',
      'World Cup 2026 multi-national fan',
      'Women\'s football superfan persona'
    ]
  },
  compare: {
    label: 'Audience Comparison',
    placeholder: "What to compare — e.g. 'RB vs SAB audience on music'",
    pills: [
      'RB vs SAB on music consumption',
      'RB vs SAB on brand attitudes',
      'RB vs SAB on social media habits',
      'Men\'s vs women\'s football fans on gaming',
      'RB vs SAB on fashion and spending'
    ]
  },
  campaign: {
    label: 'Campaign Naming',
    placeholder: "Describe the campaign — e.g. 'Nike women\'s football community activation'",
    pills: [
      'Nike women\'s grassroots tournament',
      'Spotify x EA FC music discovery campaign',
      'Mental health in football awareness push',
      'World Cup 2026 multi-national fan series',
      'Headphones brand tunnel walk content'
    ]
  },
  calendar: {
    label: 'Seasonal Calendar',
    placeholder: "Name a brand or category — e.g. 'audio brand activation windows'",
    pills: [
      'Best windows for a gaming brand',
      'Music brand activation calendar',
      'Women\'s football brand moments 2026',
      'World Cup 2026 activation timeline',
      'Fashion brand calendar for RB audience'
    ]
  },
  exec: {
    label: 'Exec Summary',
    placeholder: "Any query — response will be condensed to 3 bullets for a CMO",
    pills: [
      'Why partner with Rising Ballers',
      'World Cup 2026 opportunity in 3 bullets',
      'SAB audience value for a music brand',
      'Mental health — the commercial case',
      'RB audience vs mainstream sports media'
    ]
  }
};

const SOURCE_LIBRARY = {
  'RB IG Insights': {
    name: 'RB IG Insights Master File',
    meta: 'Rising Ballers Instagram Newsletter Polls · 50+ topics · N = 10,000–34,000 per topic',
    detail: 'Ongoing poll series sent to RB Instagram audience. Topics cover gaming, headphones, music, fashion, social media consumption, finance, travel, and more. Data collected 2023–2025.'
  },
  'SAB IG Insights': {
    name: "SAB IG Insights — She's A Baller",
    meta: "She's A Baller Instagram Newsletter Polls · N = 1,000–4,000 per topic",
    detail: "Poll series run for the SAB audience. Women's football-skewed. Topics include streaming access, female leadership, brand attitudes, and menstrual health in sport. Data collected 2023–2025."
  },
  'Next Wave Vol.1': {
    name: 'Next Wave Vol.1 — Gen Z Football Manual',
    meta: 'Quant survey · N = 867 · Fielded 2023',
    detail: 'In-depth survey of Gen Z football fans aged 16–24. Covers mental health, player relationships, gaming, music discovery, grassroots participation, and media consumption habits. Rising Ballers proprietary research.'
  },
  'World Cup Heartbeats': {
    name: 'World Cup Heartbeats — WC 2026 Quant Study',
    meta: 'Quant survey · N = 5,237 · Fielded August 2025',
    detail: 'Pre-tournament study examining how the RB audience plans to engage with World Cup 2026. Covers platform usage, brand receptivity, content preferences, sponsorship attitudes, and multi-national fandom. Largest single RB study to date.'
  },
  "Women's Fandom Report": {
    name: "Women's Fandom Report — SAB Survey",
    meta: 'Quant survey · N = 1,153 · Fielded 2024',
    detail: "Survey of women's football fans examining fandom depth, attendance, brand attitudes, ambassador preferences, and streaming behaviour."
  }
};

const DATA_CORPUS = `
RISING BALLERS — FIRST PARTY DATA CORPUS

=== SOURCE 1: RB IG INSIGHTS MASTER FILE ===
Rising Ballers Instagram newsletter polls. 50+ topics. 10,000–34,000 respondents per topic.

CONSUMPTION & SOCIAL MEDIA:
- Instagram is go-to platform for 73% to stay up-to-date with football
- TikTok 14%, X 9%, YouTube 4%
- 57% follow players more than clubs on social media
- 58% scroll Instagram while watching a match live on TV
- 30-second is the optimal video length (58%)
- 87% prefer brands to do tournament-style events vs pop-up shops
- 65% of Gen Z consume football content primarily on Instagram

MUSIC & AUDIO:
- 87% use Spotify (vs 13% Apple Music)
- Top genres: Hip-hop, Rap, Drill, Afrobeats, Grime, R&B
- 69% discovered a new song or artist through FIFA/EA FC soundtrack
- 85% subscribe to a music platform
- 64% pre-match rituals include music

GAMING:

function getSystemPrompt(mode, fileCtx) {
  return `You are Culture Plug — the internal commercial intelligence engine for Rising Ballers, a football media and production company. You have access to Rising Ballers' proprietary first-party data corpus below.

${DATA_CORPUS}

${fileCtx ? `The user has uploaded a brand brief for context:\n${fileCtx}\n` : ''}

${MODE_PROMPTS[mode] || MODE_PROMPTS.pitch}

UNIVERSAL RULES:
- NEVER invent stats. If no data exists, say DATA GAP.
- Cite every stat immediately after using it: [Source Name, N=xxx]
- Bold stat numbers and key phrases using **markdown**
- Write confidently — this is a culture company, not a research agency
- Sharp and specific beats long and vague`;
}

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.remove('active'));
  if (btn) btn.classList.add('active');

  const m = MODES[mode];
  document.getElementById('inputBox').placeholder = m.placeholder;

  const pillsEl = document.getElementById('promptPills');
  pillsEl.innerHTML = m.pills.map(p =>
    `<button class="pill" onclick="usePill(this)">${p}</button>`
  ).join('');
}

function detectSources(text) {
  const found = [];
  for (const key of Object.keys(SOURCE_LIBRARY)) {
    if (text.includes(key)) found.push(key);
  }
  return found;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 130) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function usePill(btn) {
  document.getElementById('inputBox').value = btn.textContent.trim();
  autoResize(document.getElementById('inputBox'));
  sendMessage();
}

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  attachedFile = file;
  const chip = document.getElementById('fileChip');
  document.getElementById('fileChipName').textContent = file.name;
  chip.classList.add('visible');
  document.getElementById('uploadBtn').classList.add('has-file');
  const reader = new FileReader();
  reader.onload = e => { attachedFileContent = e.target.result; };
  if (file.type === 'application/pdf') {
    attachedFileContent = `[PDF uploaded: ${file.name}]`;
  } else {
    reader.readAsText(file);
  }
  const inputBox = document.getElementById('inputBox');
  if (!inputBox.value.trim()) {
    inputBox.value = 'Build a pitch brief based on the uploaded brief';
    autoResize(inputBox);
  }
  inputBox.focus();
  event.target.value = '';
}

function removeFile() {
  attachedFile = null;
  attachedFileContent = '';
  document.getElementById('fileChip').classList.remove('visible');
  document.getElementById('fileChipName').textContent = '';
  document.getElementById('uploadBtn').classList.remove('has-file');
}

function goHome() {
  document.getElementById('landing').style.display = '';
  document.getElementById('chatView').classList.remove('visible');
  document.getElementById('messages').innerHTML = '';
  conversationHistory = [];
  document.getElementById('inputBox').value = '';
  document.getElementById('inputBox').style.height = 'auto';
  removeFile();
}

function showChat() {
  document.getElementById('landing').style.display = 'none';
  document.getElementById('chatView').classList.add('visible');
}

function scrollBottom() {
  const main = document.getElementById('main');
  main.scrollTo({ top: main.scrollHeight, behavior: 'smooth' });
}

function addUserMsg(text) {
  showChat();
  const el = document.createElement('div');
  el.className = 'msg user';
  el.innerHTML = `<div class="msg-label">You</div><div class="msg-bubble">${text.replace(/</g,'&lt;').replace(/\n/g,'<br>')}</div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function addTyping() {
  const el = document.createElement('div');
  el.className = 'msg ai'; el.id = 'typing';
  el.innerHTML = `<div class="chat-mode-badge">${MODES[currentMode].label}</div><div class="msg-label">Culture Plug</div><div class="typing-wrap"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>`;
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function toggleSources(btn, panelId) {
  btn.classList.toggle('active');
  const panel = document.getElementById(panelId);
  panel.classList.toggle('visible');
}

function buildSourcesPanel(text, panelId) {
  const sources = detectSources(text);
  if (!sources.length) return '';
  const cards = sources.map(key => {
    const s = SOURCE_LIBRARY[key];
    return `<div class="source-card">
      <div class="source-card-name">${s.name}</div>
      <div class="source-card-meta">${s.meta}</div>
      <div class="source-card-detail">${s.detail}</div>
    </div>`;
  }).join('');
  return `<div class="sources-toggle">
    <button class="sources-btn" onclick="toggleSources(this, '${panelId}')">
      <svg viewBox="0 0 10 10" fill="none"><path d="M1 3l4 4 4-4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Show sources (${sources.length})
    </button>
    <div class="sources-panel" id="${panelId}">${cards}</div>
  </div>`;
}

function addAIMsg(text, mode) {
  const el = document.createElement('div');
  el.className = 'msg ai';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  const panelId = 'sources-' + Date.now();
  const modeLabel = MODES[mode] ? `<div class="chat-mode-badge">${MODES[mode].label}</div>` : '';
  bubble.innerHTML = modeLabel + renderMarkdown(text) + buildSourcesPanel(text, panelId);
  el.appendChild(Object.assign(document.createElement('div'), { className: 'msg-label', textContent: 'Culture Plug' }));
  el.appendChild(bubble);
  document.getElementById('messages').appendChild(el);
  scrollBottom();
}

function renderMarkdown(text) {
  const lines = text.split('\n');
  let html = '', inList = false, inOrderedList = false;
  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.startsWith('## ')) {
      if (inList) { html += '</ul>'; inList = false; }
      if (inOrderedList) { html += '</ol>'; inOrderedList = false; }
      html += `<div class="resp-section-title">${line.slice(3)}</div>`;
      continue;
    }
    if ((line.startsWith('- **') && line.includes('%')) || (line.startsWith('- **') && /\*\*\d+\.\d/.test(line))) {
      if (inList) { html += '</ul>'; inList = false; }
      if (inOrderedList) { html += '</ol>'; inOrderedList = false; }
      const m = line.match(/^- \*\*([^*]+)\*\*\s+(.+?)(?:\s+(\[.+?\]))?$/);
      if (m) {
        const num = m[1];
        const desc = m[2].replace(/\[.+?\]$/, '').trim();
        const src = (line.match(/\[([^\]]+)\]/) || ['',''])[0];
        const srcText = src ? src.slice(1,-1) : '';
        html += `<div class="stat-card"><div class="stat-number">${num}</div><div class="stat-desc">${formatInline(desc)}</div>${srcText ? `<div class="stat-source">${srcText}</div>` : ''}</div>`;
        continue;
      }
    }
    if (line.startsWith('- ')) {
      if (inOrderedList) { html += '</ol>'; inOrderedList = false; }
      if (!inList) { html += '<ul class="resp-list">'; inList = true; }
      html += `<li>${formatInline(line.slice(2))}</li>`;
      continue;
    }
    const nm = line.match(/^(\d+)\. (.+)/);
    if (nm) {
      if (inList) { html += '</ul>'; inList = false; }
      if (!inOrderedList) { html += '<ol class="resp-list resp-olist">'; inOrderedList = true; }
      html += `<li><span class="list-num">${nm[1]}.</span><span>${formatInline(nm[2])}</span></li>`;
      continue;
    }
    if (line.trim() === '') {
      if (inList) { html += '</ul>'; inList = false; }
      if (inOrderedList) { html += '</ol>'; inOrderedList = false; }
      html += '<div class="resp-spacer"></div>';
      continue;
    }
    if (inList) { html += '</ul>'; inList = false; }
    if (inOrderedList) { html += '</ol>'; inOrderedList = false; }
    html += `<p class="resp-para">${formatInline(line)}</p>`;
  }
  if (inList) html += '</ul>';
  if (inOrderedList) html += '</ol>';
  return html;
}

function formatInline(text) {
  return text
    .replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>')
    .replace(/\[([^\]]+)\]/g, '<span class="citation">[$1]</span>');
}

async function sendMessage() {
  const inputBox = document.getElementById('inputBox');
  const sendBtn = document.getElementById('sendBtn');
  const userText = inputBox.value.trim();
  if ((!userText && !attachedFile) || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;

  const displayText = attachedFile
    ? `${userText}${userText ? '\n' : ''}📎 ${attachedFile.name}`
    : userText;

  inputBox.value = '';
  inputBox.style.height = 'auto';

  const fileCtx = attachedFile
    ? `Attached brief: "${attachedFile.name}"${attachedFileContent ? '\n\n' + attachedFileContent.slice(0, 3000) : ''}`
    : '';
  const modeAtSend = currentMode;
  removeFile();

  addUserMsg(displayText);
  addTyping();

  try {
    const messages = [
      ...conversationHistory,
      { role: 'user', content: (userText || 'Build a pitch brief based on the attached file') + (fileCtx ? '\n\n[ATTACHED BRIEF]\n' + fileCtx : '') }
    ];

    const response = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-opus-4-6',
        max_tokens: 2000,
        system: getSystemPrompt(modeAtSend, fileCtx),
        messages
      })
    });

    const data = await response.json();
    removeTyping();

    if (data.error) {
      addAIMsg('## ERROR\n' + (data.error.message || 'Something went wrong. Please try again.'), modeAtSend);
    } else {
      const aiText = data.content[0].text;
      conversationHistory.push({ role: 'user', content: userText || 'Build a pitch brief' });
      conversationHistory.push({ role: 'assistant', content: aiText });
      addAIMsg(aiText, modeAtSend);
    }
  } catch (err) {
    removeTyping();
    addAIMsg('## CONNECTION ERROR\nCould not reach the server. Please check your connection and try again.', modeAtSend);
  }

  isLoading = false;
  sendBtn.disabled = false;
}

// Initialise pills on load
setMode('pitch', document.querySelector('.mode-tab.active'));
</script>
